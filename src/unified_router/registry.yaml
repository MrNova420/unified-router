# Registry of all providers supported by unified-router
# OpenAI-compatible providers share ONE handler class.
# Custom-API providers each have their own adapter file.
#
# Type: free = always free, no phone/card needed
#       phone = requires phone verification
#       credits = trial credits or free tier with card
#       paid = paid service
#
# Adding a new OpenAI-compatible provider = add 6-8 lines here, no code.

openai_compatible:
  openrouter:
    name: "OpenRouter"
    base_url: "https://openrouter.ai/api/v1"
    env_key: "OPENROUTER_API_KEY"
    signup_url: "https://openrouter.ai/settings/keys"
    free_tier: "20 req/min, 50 req/day (free models)"
    type: free

  groq:
    name: "Groq"
    base_url: "https://api.groq.com/openai/v1"
