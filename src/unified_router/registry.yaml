    env_key: "CLOUDFLARE_API_TOKEN"
    env_account_id: "CLOUDFLARE_ACCOUNT_ID"
    signup_url: "https://dash.cloudflare.com/?to=/:account/workers/ai"
    free_tier: "10k neurons/day"
    type: free

