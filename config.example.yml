# Unified Router Configuration
# All 44+ providers are auto-discovered from registry.yaml.
# You only need to set API keys — everything else is automatic.

server:
  host: "127.0.0.1"
  port: 3333
  log_level: "info"

# Priority order: router tries providers top to bottom on failure
# Top 6 are the most universally useful free providers.
priority:
  - openrouter
  - nvidia
  - gemini
  - opencode_zen
  - xai
  - groq
  - cerebras
  - deepseek
  - mistral
  - codestral
  - together
  - fireworks
  - deepinfra
  - github_models
  - cohere
  - huggingface
  - cloudflare
  - ai302
  - nebius
  - novita
  - hyperbolic
  - sambanova
  - scaleway
  - venice
  - baseten
  - gmi_cloud
  - io_net
  - cortecs
  - frogbot
  - minimax
  - moonshot
  - ai21
  - upstage
  - nlp_cloud
  - alibaba
  - digitalocean
  - ovhcloud
  - stackit
  - sap_ai
  - snowflake
  - ollama_cloud
  - vercel_gateway
  - modal
  - inference_net

# Provider API keys — set these or use environment variables.
# All standard env vars detected automatically.
providers:
  openrouter:
    api_key: "${OPENROUTER_API_KEY}"

  groq:
    api_key: "${GROQ_API_KEY}"

  opencode_zen:
    api_key: "${OPENCODE_API_KEY}"

  xai:
    api_key: "${XAI_API_KEY}"

  cloudflare:
    api_key: "${CLOUDFLARE_API_TOKEN}"
    account_id: "${CLOUDFLARE_ACCOUNT_ID}"

  cohere:
    api_key: "${COHERE_API_KEY}"

  huggingface:
    api_key: "${HF_TOKEN}"

  gemini:
    api_key: "${GEMINI_API_KEY}"
