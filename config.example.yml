# Unified Router Configuration
# All 41+ providers are auto-discovered from registry.yaml.
# You only need to set API keys — everything else is automatic.

server:
  host: "127.0.0.1"
  port: 3333
  log_level: "info"

# Priority order: router tries providers top to bottom on failure
# Customize this list to your preference. Remove providers you don't use.
priority:
  - openrouter
  - groq
  - cerebras
  - deepseek
  - together
  - fireworks
  - deepinfra
  - mistral
  - codestral
  - nvidia
  - github_models
  - gemini
  - cohere
  - huggingface
  - cloudflare
  - ai302
  - nebius
  - novita
  - hyperbolic
  - sambanova
  - scaleway
  - venice
  - baseten
  - gmi_cloud
  - io_net
  - cortecs
  - frogbot
  - minimax
  - moonshot
  - ai21
  - upstage
  - nlp_cloud
  - alibaba
  - digitalocean
  - ovhcloud
  - stackit
  - sap_ai
  - snowflake
  - ollama_cloud
  - vercel_gateway
  - modal
  - inference_net

# Provider API keys — set these or use environment variables.
# All standard env vars (OPENROUTER_API_KEY, GROQ_API_KEY, etc.) 
# are detected automatically. You only need to specify keys here
# if you want to override env vars or set keys directly.
providers:
  openrouter:
    api_key: "${OPENROUTER_API_KEY}"

  groq:
    api_key: "${GROQ_API_KEY}"

  # cloudflare needs both api_key and account_id
  cloudflare:
    api_key: "${CLOUDFLARE_API_TOKEN}"
    account_id: "${CLOUDFLARE_ACCOUNT_ID}"

  # cohere, huggingface, etc — just add api_key as needed
  cohere:
    api_key: "${COHERE_API_KEY}"

  huggingface:
    api_key: "${HF_TOKEN}"
